<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SGR Skill Centre</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            background: none;
            font-size: 1rem;
        }
        .tab.active {
            background: white;
            color: #00695c;
            border-bottom: 3px solid #00695c;
        }
        .tab:hover {
            background: #e0e0e0;
        }
        .tab-content {
            display: none;
            padding: 2rem;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #004d40;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
        }
        .submit-btn {
            background: linear-gradient(135deg, #00695c, #004d40);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .certificate-list, .enquiries-list {
            margin-top: 2rem;
        }
        .cert-card {
            background: #f9f9f9;
            border-left: 5px solid #00695c;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 15px;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .cert-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
        }
        .cert-details {
            flex: 1;
        }
        .delete-btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .enquiry-card {
            background: #f9f9f9;
            border-left: 5px solid #ff9800;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 15px;
        }
        .logout-btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 2rem;
        }
        .login-box {
            text-align: center;
            padding: 3rem;
        }
        .login-box input {
            width: 60%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: center;
        }
        .error-msg {
            color: red;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-lock"></i> Admin Panel - SGR Skill Centre</h1>
        <a href="index.html" style="color:white; text-decoration:none;">🏠 Home</a>
    </header>

    <div class="admin-container">
        <!-- Login Section -->
        <div id="loginSection" class="login-box">
            <h2><i class="fas fa-key"></i> Admin Login</h2>
            <input type="password" id="passwordInput" placeholder="Enter Password">
            <br>
            <button class="submit-btn" onclick="checkPassword()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <p id="errorMsg" class="error-msg">❌ Wrong Password! Try again.</p>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" style="display:none;">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="showTab('certificates')">
                    <i class="fas fa-certificate"></i> 📜 Certificates
                </button>
                <button class="tab" onclick="showTab('enquiries')">
                    <i class="fas fa-envelope"></i> 📋 Enquiries
                </button>
            </div>

            <!-- Certificates Tab -->
            <div id="certificatesTab" class="tab-content active">
                <h2><i class="fas fa-plus-circle"></i> Add Student Certificate</h2>
                <form id="certForm">
                    <div class="form-group">
                        <label>Certificate Number *</label>
                        <input type="text" id="certId" placeholder="e.g., SGRT001" required>
                    </div>
                    <div class="form-group">
                        <label>Student Full Name *</label>
                        <input type="text" id="studentName" placeholder="Student Name" required>
                    </div>
                    <div class="form-group">
                        <label>Course *</label>
                        <select id="course" required>
                            <option value="">Select Course</option>
                            <option value="Computer Courses">💻 Computer Courses</option>
                            <option value="Stitching Courses">🪡 Stitching Courses</option>
                            <option value="Beauty Culture Courses">💄 Beauty Culture Courses</option>
                            <option value="English Speaking Courses">🗣️ English Speaking Courses</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Issue Date *</label>
                        <input type="date" id="issueDate" required>
                    </div>
                    <div class="form-group">
                        <label>Student Photo *</label>
                        <input type="file" id="studentPhoto" accept="image/*" required>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-save"></i> Save Certificate
                    </button>
                </form>

                <h2 style="margin-top: 2rem;"><i class="fas fa-list"></i> All Certificates</h2>
                <div id="certificatesList" class="certificate-list"></div>
            </div>

            <!-- Enquiries Tab -->
            <div id="enquiriesTab" class="tab-content">
                <h2><i class="fas fa-inbox"></i> Student Enquiries</h2>
                <div id="enquiriesList" class="enquiries-list"></div>
            </div>

            <div style="text-align: center;">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "7085";

        function checkPassword() {
            let enteredPassword = document.getElementById("passwordInput").value;
            let errorMsg = document.getElementById("errorMsg");
            
            if(enteredPassword === ADMIN_PASSWORD) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("dashboardSection").style.display = "block";
                errorMsg.style.display = "none";
                loadCertificates();
                loadEnquiries();
            } else {
                errorMsg.style.display = "block";
                document.getElementById("passwordInput").value = "";
            }
        }

        function showTab(tabName) {
            // Hide all tabs
            document.getElementById("certificatesTab").classList.remove("active");
            document.getElementById("enquiriesTab").classList.remove("active");
            
            // Show selected tab
            if(tabName === "certificates") {
                document.getElementById("certificatesTab").classList.add("active");
            } else {
                document.getElementById("enquiriesTab").classList.add("active");
            }
            
            // Update tab buttons
            let tabs = document.querySelectorAll(".tab");
            tabs.forEach(tab => tab.classList.remove("active"));
            event.target.classList.add("active");
        }

        // Add Certificate with Photo
        document.getElementById("certForm")?.addEventListener("submit", function(e) {
            e.preventDefault();
            
            let certId = document.getElementById("certId").value;
            let studentName = document.getElementById("studentName").value;
            let course = document.getElementById("course").value;
            let issueDate = document.getElementById("issueDate").value;
            let photoFile = document.getElementById("studentPhoto").files[0];
            
            if(!photoFile) {
                alert("Please select a photo!");
                return;
            }
            
            let reader = new FileReader();
            reader.onload = function(event) {
                let certificates = JSON.parse(localStorage.getItem("certificates")) || [];
                certificates.push({
                    certId: certId,
                    studentName: studentName,
                    course: course,
                    issueDate: issueDate,
                    photo: event.target.result
                });
                localStorage.setItem("certificates", JSON.stringify(certificates));
                alert("✅ Certificate Added Successfully!");
                document.getElementById("certForm").reset();
                loadCertificates();
            };
            reader.readAsDataURL(photoFile);
        });

        function loadCertificates() {
            let certificates = JSON.parse(localStorage.getItem("certificates")) || [];
            let container = document.getElementById("certificatesList");
            
            if(certificates.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666;">No certificates added yet.</p>`;
                return;
            }
            
            container.innerHTML = "";
            certificates.reverse().forEach((cert, index) => {
                container.innerHTML += `
                    <div class="cert-card">
                        <img src="${cert.photo}" alt="Student Photo">
                        <div class="cert-details">
                            <strong>${cert.certId}</strong><br>
                            Name: ${cert.studentName}<br>
                            Course: ${cert.course}<br>
                            Date: ${cert.issueDate}
                        </div>
                        <button class="delete-btn" onclick="deleteCertificate('${cert.certId}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                `;
            });
        }

        function deleteCertificate(certId) {
            if(confirm("Are you sure you want to delete this certificate?")) {
                let certificates = JSON.parse(localStorage.getItem("certificates")) || [];
                let newCertificates = certificates.filter(c => c.certId !== certId);
                localStorage.setItem("certificates", JSON.stringify(newCertificates));
                loadCertificates();
                alert("Certificate deleted!");
            }
        }

        function loadEnquiries() {
            let enquiries = JSON.parse(localStorage.getItem("enquiries")) || [];
            let container = document.getElementById("enquiriesList");
            
            if(enquiries.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666;">No enquiries yet.</p>`;
                return;
            }
            
            container.innerHTML = "";
            enquiries.reverse().forEach(enq => {
                container.innerHTML += `
                    <div class="enquiry-card">
                        <strong><i class="fas fa-user"></i> ${enq.name}</strong><br>
                        <i class="fas fa-phone"></i> ${enq.phone}<br>
                        <i class="fas fa-envelope"></i> ${enq.email || "No email"}<br>
                        <i class="fas fa-graduation-cap"></i> ${enq.course}<br>
                        <i class="fas fa-comment"></i> ${enq.message || "No message"}<br>
                        <small><i class="fas fa-calendar"></i> ${enq.date}</small>
                    </div>
                `;
            });
        }

        function logout() {
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("dashboardSection").style.display = "none";
            document.getElementById("passwordInput").value = "";
        }

        // Load sample certificates if empty
        if(!localStorage.getItem("certificates")) {
            let sampleCerts = [
                {
                    certId: "SGRT001",
                    studentName: "Rahul Sharma",
                    course: "Computer Courses",
                    issueDate: "2025-01-15",
                    photo: "https://randomuser.me/api/portraits/men/1.jpg"
                },
                {
                    certId: "SGRT002",
                    studentName: "Priya Singh",
                    course: "Stitching Courses",
                    issueDate: "2025-01-20",
                    photo: "https://randomuser.me/api/portraits/women/1.jpg"
                }
            ];
            localStorage.setItem("certificates", JSON.stringify(sampleCerts));
        }
    </script>
</body>
</html>
